<!DOCTYPE html>
<html>
<head>
  <title>出欠記録フォーム</title>
  <script>
    // 位置情報取得と範囲内外チェック関数
    function getLocationAndCheck() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          var lat = position.coords.latitude;
          var lon = position.coords.longitude;

          // 茜浜球場の座標
          var targetLat = 35.662683;
          var targetLon = 140.008933;
          var threshold = 0.001; // 許容範囲 (100m)

          // 2点間の距離を計算（Haversine式）
          var distance = calculateDistance(lat, lon, targetLat, targetLon);
          
          if (distance > threshold) {
            alert("位置情報が正しくありません。茜浜球場付近からアクセスしてください。");
            return;  // 送信停止
          } else {
            // 位置情報が正しい場合、フォームに送信
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lon;
            document.getElementById('attendanceForm').submit();  // フォーム送信
            // 記録完了メッセージの表示
            document.getElementById('message').innerText = "記録を完了しました！";
          }
        }, function(error) {
          alert("位置情報が取得できません");
        });
      } else {
        alert("位置情報取得がサポートされていません");
      }
    }

    // 2点間の距離を計算（Haversine式）
    function calculateDistance(lat1, lon1, lat2, lon2) {
      var R = 6371; // 地球の半径 (km)
      var dLat = degreesToRadians(lat2 - lat1);
      var dLon = degreesToRadians(lon2 - lon1);
      
      var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(degreesToRadians(lat1)) * Math.cos(degreesToRadians(lat2)) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
      var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      
      var distance = R * c; // 距離を求める
      return distance;
    }

    // 度をラジアンに変換
    function degreesToRadians(degrees) {
      return degrees * Math.PI / 180;
    }
  </script>
</head>
<body>
  <h2>出欠記録フォーム</h2>
  <form id="attendanceForm" action="https://docs.google.com/forms/d/11u-H6JEc2_7lcMvyHNQt698voXjqTPBELZJewiwMmHo/edit" method="POST">
    <!-- 氏名入力 -->
    <label for="name">氏名:</label>
    <input type="text" name="entry.XXXXXXX" id="name" required>
    <br>
    
    <!-- 出欠記録 -->  
    <label for="attendance">出欠記録:</label><br>
    <input type="radio" id="start" name="attendance" value="開始" required>
    <label for="start">開始</label><br>
    <input type="radio" id="end" name="attendance" value="終了" required>
    <label for="end">終了</label><br>
    //ラジオボタン式に仕様変更
    
    <br>
    <label for="pitches">投球数 (任意):</label>
    <input type="number" name="entry.AAAAAAA" placeholder="投球数">
    <br>
    
    <!-- 位置情報 (非表示) -->
    <input type="hidden" name="entry.BBBBBBB" id="latitude">
    <input type="hidden" name="entry.CCCCCC" id="longitude">
    
    <!-- 送信ボタン -->
    <input type="button" value="送信" onclick="getLocationAndCheck()">
  </form>
  
  <!-- 記録完了メッセージ -->
  <div id="message"></div> //記録完了メッセージを表記
</body>
</html>
