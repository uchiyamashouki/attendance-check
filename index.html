<!DOCTYPE html>
<html>
<head>
  <title>出欠記録フォーム</title>
  <style>
    /* 基本のスタイルとレスポンシブ対応 */
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      padding: 10px;
      margin: 0;
      box-sizing: border-box;
    }
    h2 {
      font-size: 24px;
    }
    label, input {
      font-size: 18px;
    }
    input[type="text"], input[type="number"], input[type="button"] {
      font-size: 18px;
      padding: 10px;
      width: 100%;
    }
    /* スマホ対応 */
    @media (max-width: 600px) {
      body {
        font-size: 16px;
      }
      input[type="text"], input[type="number"], input[type="button"] {
        font-size: 16px;
      }
      h2 {
        font-size: 20px;
      }
    }
  </style>
  <script>
    // 位置情報取得と範囲内外チェック関数
    function getLocationAndCheck() {
      // ユーザーの位置情報を取得
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          var lat = position.coords.latitude;  // 緯度
          var lon = position.coords.longitude; // 経度

          // 茜浜球場の座標（デフォルトの座標）
          var targetLat = 35.662683;
          var targetLon = 140.008933;
          var threshold = 10000; // 許容範囲 (100m * 100倍)

          // 位置情報と茜浜球場の距離を計算
          var distance = calculateDistance(lat, lon, targetLat, targetLon);
          
          // 範囲外の場合、送信を停止しメッセージを表示
          if (distance > threshold) {
            alert("位置情報が正しくありません。茜浜球場付近からアクセスしてください。");
            return;  // 送信しない
          } else {
            // 範囲内の場合、フォームの隠しフィールドに位置情報を設定
            document.getElementById('latitude').value = lat;  // 緯度を隠しフィールドに設定
            document.getElementById('longitude').value = lon; // 経度を隠しフィールドに設定
            sendFormData();  // フォームデータを送信
            // 送信完了メッセージを表示
            document.getElementById('message').innerText = "送信完了　ページを閉じてください";
          }
        }, function(error) {
          alert("位置情報が取得できません");
        });
      } else {
        alert("位置情報取得がサポートされていません");
      }
    }

    // 2点間の距離を計算する関数（Haversine式）
    function calculateDistance(lat1, lon1, lat2, lon2) {
      var R = 6371; // 地球の半径 (km)
      var dLat = degreesToRadians(lat2 - lat1);
      var dLon = degreesToRadians(lon2 - lon1);
      
      var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(degreesToRadians(lat1)) * Math.cos(degreesToRadians(lat2)) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
      var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      
      var distance = R * c; // 距離を求める
      return distance;
    }

    // 度をラジアンに変換する関数
    function degreesToRadians(degrees) {
      return degrees * Math.PI / 180;
    }

    // フォームデータを送信する関数
    function sendFormData() {
      var form = document.getElementById('attendanceForm');
      // Googleフォームの送信URL（formResponse）
      form.action = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSegSTTLeL75exvNWpF2iEQqdP8nUC4p55TBLpjvPR1WGefBCA/formResponse";
      form.method = "POST"; // フォーム送信のHTTPメソッド（POST）
      form.submit();  // フォーム送信
    }
  </script>
</head>
<body>
  <h2>出欠記録フォーム</h2>
  <form id="attendanceForm">
    <!-- 氏名入力 -->
    <label for="name">氏名:</label>
    <input type="text" name="entry.1235081500" id="name" required>
    <br>
    
    <!-- 出欠記録 -->
    <label for="attendance">出欠記録:</label><br>
    <input type="radio" id="start" name="attendance" value="開始" required>
    <label for="start">開始</label><br>
    <input type="radio" id="end" name="attendance" value="終了" required>
    <label for="end">終了</label><br>
    
    <br>
    <label for="pitches">投球数 (任意):</label>
    <input type="number" name="entry.2025397394" placeholder="投球数">
    <br>
    
    <!-- 位置情報 (非表示) -->
    <input type="hidden" name="entry.658296585" id="latitude">
    <input type="hidden" name="entry.360519448" id="longitude">
    
    <!-- 送信ボタン -->
    <input type="button" value="送信" onclick="getLocationAndCheck()">
  </form>
  
  <!-- 送信完了メッセージ -->
  <div id="message"></div> 
</body>
</html>
