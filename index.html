<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>顔認証 出欠記録（face-api.js版）</title>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
  <style>
    video {
      width: 100%;
      max-width: 400px;
      border: 1px solid #ccc;
    }
    #nameDisplay {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 10px;
    }
    #recordForm, #registerForm, #deleteForm {
      display: none;
      margin-top: 20px;
    }
    label, select, input {
      display: block;
      margin-bottom: 10px;
    }
    button {
      padding: 10px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h2>顔認証による本人確認（複数人対応）</h2>
  <video id="video" autoplay muted playsinline></video>
  <div id="nameDisplay">認証中...</div>

  <form id="registerForm">
    <label>氏名を入力して登録：</label>
    <input type="text" id="newName" required placeholder="例：工大 太郎">
    <button type="button" id="registerBtn">顔と氏名を登録</button>
  </form>

  <form id="deleteForm">
    <label>削除する氏名：</label>
    <input type="text" id="deleteName" placeholder="例：工大 太郎">
    <label>パスワード：</label>
    <input type="password" id="deletePass" placeholder="パスワード">
    <button type="button" id="deleteBtn">登録データを削除</button>
  </form>

  <form id="recordForm">
    <label>開始 / 終了:</label>
    <select id="status" required>
      <option value="">選択してください</option>
      <option value="開始">開始</option>
      <option value="終了">終了</option>
    </select>
    <label>投球数（任意）:</label>
    <input type="number" id="pitchCount" placeholder="投球数">
    <button type="submit">記録を送信</button>
  </form>

  <script>
    const video = document.getElementById('video');
    const nameDisplay = document.getElementById('nameDisplay');
    const registerForm = document.getElementById('registerForm');
    const recordForm = document.getElementById('recordForm');
    const deleteForm = document.getElementById('deleteForm');
    const newNameInput = document.getElementById('newName');
    const registerBtn = document.getElementById('registerBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const deleteNameInput = document.getElementById('deleteName');
    const deletePassInput = document.getElementById('deletePass');

    let labeledDescriptors = [];
    let authenticatedName = null;

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
    }

    function loadProfiles() {
      const data = JSON.parse(localStorage.getItem('faceProfiles') || '[]');
      return data.map(p => new faceapi.LabeledFaceDescriptors(p.name, [new Float32Array(p.descriptor)]));
    }

    function saveProfile(name, descriptor) {
      const data = JSON.parse(localStorage.getItem('faceProfiles') || '[]');
      data.push({ name, descriptor: Array.from(descriptor) });
      localStorage.setItem('faceProfiles', JSON.stringify(data));
      alert(`${name} を登録しました`);
    }

    function deleteProfile(name, password) {
      if (password !== 'Kodai1942!') return alert('パスワードが正しくありません');
      let data = JSON.parse(localStorage.getItem('faceProfiles') || '[]');
      data = data.filter(p => p.name !== name);
      localStorage.setItem('faceProfiles', JSON.stringify(data));
      alert(`${name} を削除しました`);
      location.reload();
    }

    async function recognizeFace() {
      const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
      if (!detections) return;
      const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
      const match = faceMatcher.findBestMatch(detections.descriptor);
      if (match.label !== 'unknown') {
        authenticatedName = match.label;
        nameDisplay.textContent = `${authenticatedName} さんとして認証されました`;
        recordForm.style.display = 'block';
        registerForm.style.display = 'none';
        deleteForm.style.display = 'block';
      } else {
        nameDisplay.textContent = '未登録の顔です';
        registerForm.style.display = 'block';
      }
    }

    registerBtn.onclick = async () => {
      if (!newNameInput.value.trim()) return alert('氏名を入力してください');
      const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
      if (!detection) return alert('顔が検出されません');
      saveProfile(newNameInput.value.trim(), detection.descriptor);
      location.reload();
    };

    deleteBtn.onclick = () => {
      deleteProfile(deleteNameInput.value.trim(), deletePassInput.value);
    };

    recordForm.onsubmit = async (e) => {
      e.preventDefault();
      const status = document.getElementById('status').value;
      const pitch = document.getElementById('pitchCount').value;
      const formData = new FormData();
      formData.append("entry.411119479", authenticatedName);
      formData.append("entry.1823206220", status);
      formData.append("entry.114182324", pitch);
      fetch("https://docs.google.com/forms/d/e/1FAIpQLSegSTTLeL75exvNWpF2iEQqdP8nUC4p55TBLpjvPR1WGefBCA/formResponse", {
        method: "POST",
        mode: "no-cors",
        body: formData
      });
      alert("送信完了しました！");
      recordForm.reset();
      recordForm.style.display = 'none';
    };

    async function init() {
      await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');
      await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');
      await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');
      labeledDescriptors = loadProfiles();
      await startCamera();
      setInterval(recognizeFace, 2000);
    }

    init();
  </script>
</body>
</html>
